app = "ultradag-node-2"
primary_region = "ams"

[build]

[env]
  RUST_LOG = "info"
  PORT = "9333"
  RPC_PORT = "10333"
  DATA_DIR = "/data"
  VALIDATORS = "4"
  SEED = "ultradag-node-1.internal:9333 ultradag-node-3.internal:9333 ultradag-node-4.internal:9333"
  NO_BOOTSTRAP = "true"
  CLEAN_STATE = "true"

[mounts]
  source = "ultradag_data"
  destination = "/data"

[http_service]
  internal_port = 10333
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[services]]
  internal_port = 9333
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 9333

