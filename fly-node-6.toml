# fly.toml app configuration file generated for ultradag-node-6-withered-silence-1830 on 2026-03-08T18:45:42+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ultradag-node-6-withered-silence-1830'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 10333
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/status'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
