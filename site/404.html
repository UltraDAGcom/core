<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Page not found - UltraDAG">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%233d9be9' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%233d9be9'/%3E%3C/svg%3E">
<title>404 — Page Not Found | UltraDAG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#0e1322;--bg3:#131a2b;
  --border:#1a2540;--border2:#223050;
  --dim:#2e4060;--muted:#4a6488;--subtle:#7090b8;
  --body:#94b8d8;--bright:#c8e0f4;--white:#edf4fb;
  --accent:#3d9be9;--accent2:#1a6fb5;
  --glow:rgba(61,155,233,0.15);
}
body{background:var(--bg);color:var(--body);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{text-align:center;max-width:600px}
.error-code{font-family:'DM Mono',monospace;font-size:120px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:24px;text-shadow:0 0 40px var(--glow)}
h1{font-family:'Cormorant',serif;font-size:42px;font-weight:400;color:var(--white);margin-bottom:16px;letter-spacing:-0.02em}
p{font-size:18px;color:var(--subtle);margin-bottom:40px;line-height:1.6}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
a{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);text-decoration:none;padding:12px 24px;border:1px solid var(--border);border-radius:2px;transition:all 0.2s}
a:hover{border-color:var(--accent);background:var(--glow);color:var(--white)}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:-1}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <div class="links">
    <a href="/">Home</a>
    <a href="/docs.html">Documentation</a>
    <a href="/network.html">Live Network</a>
    <a href="/dashboard.html">Dashboard</a>
  </div>
</div>
</body>
</html>
