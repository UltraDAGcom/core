app = "ultradag-mainnet-4"
primary_region = "ams"

[build]

[env]
  RUST_LOG = "info"
  PORT = "9333"
  RPC_PORT = "10333"
  DATA_DIR = "/data"
  VALIDATORS = "5"
  SEED = "ultradag-mainnet-1.internal:9333 ultradag-mainnet-2.internal:9333 ultradag-mainnet-3.internal:9333 ultradag-mainnet-5.internal:9333"
  NO_BOOTSTRAP = "true"
  # CLEAN_STATE = "true"

[mounts]
  source = "ultradag_mainnet_data"
  destination = "/data"

[http_service]
  internal_port = 10333
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[services]]
  protocol = "tcp"
  internal_port = 9333

  [[services.ports]]
    port = 9333
    handlers = []

[deploy]
  strategy = "immediate"
