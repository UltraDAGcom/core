name: Build and Publish Latest Binary

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build testnet and mainnet binaries
        env:
          RUSTFLAGS: "-C target-cpu=x86-64"
        run: |
          mkdir -p release

          # Testnet binary (includes faucet prefund)
          cargo build --release -p ultradag-node
          cp target/release/ultradag-node release/ultradag-node-linux-x86_64
          chmod +x release/ultradag-node-linux-x86_64

          # Mainnet binary (no faucet, emission-only genesis, genesis hash enforced)
          cargo build --release -p ultradag-node --features mainnet
          cp target/release/ultradag-node release/ultradag-node-mainnet-linux-x86_64
          chmod +x release/ultradag-node-mainnet-linux-x86_64

      - name: Upload to latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: |
            release/ultradag-node-linux-x86_64
            release/ultradag-node-mainnet-linux-x86_64
          draft: false
          prerelease: true
          generate_release_notes: false
          body: |
            Latest automated build from main branch.
            Commit: ${{ github.sha }}

            **ultradag-node-linux-x86_64** — Testnet binary (includes faucet)
            **ultradag-node-mainnet-linux-x86_64** — Mainnet binary (no faucet, emission-only genesis)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
