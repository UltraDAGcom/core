version: '3.8'

services:
  node1:
    build: .
    container_name: ultradag-node-1
    ports:
      - "9333:9333"
      - "10333:10333"
    volumes:
      - node1-data:/data
    environment:
      - NODE_PORT=9333
      - VALIDATE=true
      - ROUND_MS=5000
    command: ["--port", "9333", "--validate", "--round-ms", "5000", "--data-dir", "/data"]
    networks:
      - ultradag-net

  node2:
    build: .
    container_name: ultradag-node-2
    ports:
      - "9334:9333"
      - "10334:10333"
    volumes:
      - node2-data:/data
    environment:
      - NODE_PORT=9333
      - VALIDATE=true
      - ROUND_MS=5000
    command: ["--port", "9333", "--seed", "node1:9333", "--validate", "--round-ms", "5000", "--data-dir", "/data"]
    depends_on:
      - node1
    networks:
      - ultradag-net

  node3:
    build: .
    container_name: ultradag-node-3
    ports:
      - "9335:9333"
      - "10335:10333"
    volumes:
      - node3-data:/data
    environment:
      - NODE_PORT=9333
      - VALIDATE=true
      - ROUND_MS=5000
    command: ["--port", "9333", "--seed", "node1:9333", "--validate", "--round-ms", "5000", "--data-dir", "/data"]
    depends_on:
      - node1
    networks:
      - ultradag-net

  node4:
    build: .
    container_name: ultradag-node-4
    ports:
      - "9336:9333"
      - "10336:10333"
    volumes:
      - node4-data:/data
    environment:
      - NODE_PORT=9333
      - VALIDATE=true
      - ROUND_MS=5000
    command: ["--port", "9333", "--seed", "node1:9333", "--validate", "--round-ms", "5000", "--data-dir", "/data"]
    depends_on:
      - node1
    networks:
      - ultradag-net

volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:

networks:
  ultradag-net:
    driver: bridge
