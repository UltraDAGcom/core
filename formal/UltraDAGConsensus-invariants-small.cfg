\* TLC config: invariants only, small bounds for tractable checking
\* N=4, MAX_ROUNDS=2, MAX_BYZANTINE=1 (QuorumThreshold = 3)

CONSTANTS
    VALIDATORS = {"v1", "v2", "v3", "v4"}
    MAX_ROUNDS = 2
    MAX_BYZANTINE = 1

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT Safety
INVARIANT HonestNoEquivocation
INVARIANT FinalizedParentsConsistency
INVARIANT RoundMonotonicity
INVARIANT ByzantineBound
