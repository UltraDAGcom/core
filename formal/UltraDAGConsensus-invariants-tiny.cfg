\* TLC config: invariants only, minimal bounds for tractable checking
\* N=3, MAX_ROUNDS=2, MAX_BYZANTINE=1 (QuorumThreshold = ceil(6/3) = 2... no, (2*3+2)/3 = 2)
\* Actually QuorumThreshold = (2*3+2) div 3 = 8 div 3 = 2

CONSTANTS
    VALIDATORS = {"v1", "v2", "v3"}
    MAX_ROUNDS = 2
    MAX_BYZANTINE = 1

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT Safety
INVARIANT HonestNoEquivocation
INVARIANT FinalizedParentsConsistency
INVARIANT RoundMonotonicity
INVARIANT ByzantineBound
