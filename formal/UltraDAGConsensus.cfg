\* TLC Model Checker Configuration for UltraDAGConsensus
\*
\* 4 validators, max 4 rounds, at most 1 Byzantine validator.
\* With N=4: QuorumThreshold = ceil(8/3) = 3, MAX_BYZANTINE = floor(3/3) = 1.
\*
\* Usage:
\*   java -XX:+UseParallelGC -jar tla2tools.jar -config UltraDAGConsensus.cfg UltraDAGConsensus.tla

\* =========================================================================
\* Constants
\* =========================================================================

CONSTANTS
    VALIDATORS = {"v1", "v2", "v3", "v4"}
    MAX_ROUNDS = 4
    MAX_BYZANTINE = 1

\* =========================================================================
\* Specification (includes fairness for liveness checking)
\* Uses Spec = Init /\ [][Next]_vars /\ Fairness
\* =========================================================================

SPECIFICATION Spec

\* =========================================================================
\* Invariants (checked at every reachable state)
\* =========================================================================

INVARIANT TypeOK
INVARIANT Safety
INVARIANT HonestNoEquivocation
INVARIANT FinalizedParentsConsistency
INVARIANT RoundMonotonicity
INVARIANT ByzantineBound

\* =========================================================================
\* Temporal Properties (checked over all behaviors under fairness)
\* =========================================================================

PROPERTY Liveness
