# Cargo configuration for UltraDAG
# Sets default flags for builds and lints

[build]
# Enable all warnings by default
rustflags = ["-W", "missing-docs"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native", "-W", "missing-docs"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native", "-W", "missing-docs"]

# Clippy configuration
[alias]
lint = "clippy --all-targets --all-features -- -D warnings -W clippy::all -W clippy::pedantic"
